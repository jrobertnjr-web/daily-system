<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James Sexy Body</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root {
  --black:#0a0a0a;--dark:#111111;--border:#2a2a2a;
  --gold:#c9a84c;--gold-light:#e8c96e;--gold-dim:rgba(201,168,76,0.15);
  --text:#f0ece4;--text-dim:#8a8580;--text-muted:#4a4640;
  --green:#4a9e6b;--green-dim:rgba(74,158,107,0.15);
  --blue-hdr:#0d1b2e;--blue-dot:#5ba4e6;--blue-time:#5ba4e6;--blue-title:#b8d4f0;--blue-bg:#0a1520;--blue-text:#c8dff0;
  --teal-hdr:#0d2420;--teal-dot:#3dbf9a;--teal-time:#3dbf9a;--teal-title:#9ee0cc;--teal-bg:#0a1c18;--teal-text:#b8e8d8;
  --gold-hdr:#221c0e;--gold-time:#e8c96e;--gold-title:#e8c96e;--gold-bg:#1a1508;--gold-text:#e0d09a;
  --purple-hdr:#1a1530;--purple-dot:#9b87e0;--purple-time:#9b87e0;--purple-title:#c4b8f0;--purple-bg:#140f28;--purple-text:#ccc0f0;
  --night-hdr:#161616;--night-dot:#8a8580;--night-time:#8a8580;--night-title:#a8a8a0;--night-bg:#111;--night-text:#b0aca8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--text);font-family:'DM Sans',Georgia,sans-serif;font-weight:300;min-height:100vh;}
.app{max-width:780px;margin:0 auto;padding:0 16px 80px;}
.header{padding:36px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px;}
.logo{font-family:'Bebas Neue',Impact,sans-serif;font-size:42px;letter-spacing:0.04em;line-height:1;}
.logo span{color:var(--gold);}
.tagline{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-dim);margin-top:6px;font-family:'DM Mono',monospace;}
.header-pills{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.pill{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em;color:var(--text-muted);padding:4px 10px;border:1px solid var(--border);border-radius:2px;text-transform:uppercase;}
.pill.today{color:var(--gold);border-color:var(--gold-dim);background:var(--gold-dim);}
.day-nav{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:20px;}
.day-btn{background:transparent;border:1px solid var(--border);color:var(--text-muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;padding:10px 2px 8px;cursor:pointer;border-radius:2px;text-align:center;-webkit-tap-highlight-color:transparent;}
.day-btn .ds{display:block;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;margin-bottom:2px;color:var(--text-dim);}
.day-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}
.day-btn.active .ds{color:var(--gold);}
.prog-wrap{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--dark);border:1px solid var(--border);border-radius:4px;margin-bottom:24px;}
.prog-pct{font-family:'Bebas Neue',Impact,sans-serif;font-size:24px;color:var(--gold);min-width:52px;}
.prog-track{flex:1;height:3px;background:var(--border);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:99px;width:0%;transition:width 0.3s;}
.prog-txt{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);white-space:nowrap;}
.reset-btn{background:transparent;border:1px solid var(--border);color:var(--text-muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;padding:6px 10px;cursor:pointer;border-radius:2px;-webkit-tap-highlight-color:transparent;}
.day-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.day-title{font-family:'Bebas Neue',Impact,sans-serif;font-size:36px;letter-spacing:0.04em;line-height:1;}
.day-focus{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);font-family:'DM Mono',monospace;margin-top:5px;}
.dry-badge{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;padding:5px 10px;border-radius:2px;white-space:nowrap;flex-shrink:0;}
.dry-badge.dry{background:var(--green-dim);color:var(--green);border:1px solid rgba(74,158,107,0.3);}
.dry-badge.drink{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(201,168,76,0.3);}

/* TIME BLOCKS */
.time-block{margin-bottom:8px;border-radius:6px;overflow:hidden;}
.block-header{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.block-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.block-info{flex:1;}
.block-time{font-size:10px;font-weight:500;letter-spacing:0.1em;font-family:'DM Mono',monospace;margin-bottom:2px;}
.block-title{font-size:13px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;}
.block-count{font-size:10px;font-family:'DM Mono',monospace;opacity:0.6;}
.block-chevron{color:rgba(255,255,255,0.3);transition:transform 0.2s;flex-shrink:0;}
.time-block.open .block-chevron{transform:rotate(180deg);}
.block-progress{height:2px;width:100%;}
.block-progress-fill{height:100%;width:0%;transition:width 0.3s;border-radius:99px;}
.block-items{display:none;}
.time-block.open .block-items{display:block;}

/* MORNING */
.tb-morning .block-header{background:var(--blue-hdr);}
.tb-morning .block-dot{background:var(--blue-dot);}
.tb-morning .block-time{color:var(--blue-time);}
.tb-morning .block-title{color:var(--blue-title);}
.tb-morning .block-items{background:var(--blue-bg);}
.tb-morning .block-progress{background:rgba(91,164,230,0.15);}
.tb-morning .block-progress-fill{background:var(--blue-dot);}
.tb-morning .item-name{color:var(--blue-text);}
/* SHAOLIN */
.tb-shaolin .block-header{background:var(--teal-hdr);}
.tb-shaolin .block-dot{background:var(--teal-dot);}
.tb-shaolin .block-time{color:var(--teal-time);}
.tb-shaolin .block-title{color:var(--teal-title);}
.tb-shaolin .block-items{background:var(--teal-bg);}
.tb-shaolin .block-progress{background:rgba(61,191,154,0.15);}
.tb-shaolin .block-progress-fill{background:var(--teal-dot);}
.tb-shaolin .item-name{color:var(--teal-text);}
/* POST WALK */
.tb-postwalk .block-header{background:var(--gold-hdr);}
.tb-postwalk .block-dot{background:var(--gold-time);}
.tb-postwalk .block-time{color:var(--gold-time);}
.tb-postwalk .block-title{color:var(--gold-title);}
.tb-postwalk .block-items{background:var(--gold-bg);}
.tb-postwalk .block-progress{background:rgba(232,201,110,0.15);}
.tb-postwalk .block-progress-fill{background:var(--gold-time);}
.tb-postwalk .item-name{color:var(--gold-text);}
/* ISO */
.tb-iso .block-header{background:var(--purple-hdr);}
.tb-iso .block-dot{background:var(--purple-dot);}
.tb-iso .block-time{color:var(--purple-time);}
.tb-iso .block-title{color:var(--purple-title);}
.tb-iso .block-items{background:var(--purple-bg);}
.tb-iso .block-progress{background:rgba(155,135,224,0.15);}
.tb-iso .block-progress-fill{background:var(--purple-dot);}
.tb-iso .item-name{color:var(--purple-text);}
/* NIGHT */
.tb-night .block-header{background:var(--night-hdr);}
.tb-night .block-dot{background:var(--night-dot);}
.tb-night .block-time{color:var(--night-time);}
.tb-night .block-title{color:var(--night-title);}
.tb-night .block-items{background:var(--night-bg);}
.tb-night .block-progress{background:rgba(138,133,128,0.15);}
.tb-night .block-progress-fill{background:var(--night-dot);}
.tb-night .item-name{color:var(--night-text);}

/* ITEMS */
.item{border-bottom:1px solid rgba(255,255,255,0.05);}
.item:last-child{border-bottom:none;}
.item.done .item-name{opacity:0.4;text-decoration:line-through;}
.item-row{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.chk{width:22px;height:22px;border:1.5px solid rgba(255,255,255,0.2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.done .chk{background:var(--green);border-color:var(--green);}
.chk-mark{display:none;width:11px;height:9px;}
.done .chk-mark{display:block;}
.item-body{flex:1;min-width:0;}
.item-name{font-size:14px;font-weight:500;line-height:1.3;}
.item-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);margin-top:2px;}
.exp-icon{color:rgba(255,255,255,0.25);flex-shrink:0;transition:transform 0.2s;}
.item.open .exp-icon{transform:rotate(180deg);color:var(--gold);}
.item-detail{display:none;padding:4px 16px 14px 16px;}
.item.open .item-detail{display:block;}
.detail-icon{display:flex;justify-content:center;margin:12px 0 10px;}
.detail-icon-wrap{width:76px;height:76px;background:#111;border-radius:18px;display:flex;align-items:center;justify-content:center;border:1px solid #2a2a2a;}
.dlabel{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted);margin-top:10px;margin-bottom:4px;display:block;}
.dwhy{font-size:12px;color:var(--text-dim);line-height:1.65;padding-left:10px;border-left:2px solid var(--gold-dim);}
.dhow{font-size:12px;color:var(--text);line-height:1.7;}
.dhow p{margin-bottom:4px;}
.sets-chip{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);background:var(--gold-dim);border:1px solid rgba(201,168,76,0.2);padding:3px 10px;border-radius:2px;margin-top:8px;}
.complete{display:none;background:var(--green-dim);border:1px solid rgba(74,158,107,0.3);border-radius:4px;padding:14px 18px;text-align:center;margin-bottom:20px;}
.complete.show{display:block;}
.complete p{font-family:'Bebas Neue',Impact,sans-serif;font-size:22px;color:var(--green);letter-spacing:0.06em;}
.complete small{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--border);text-align:center;}
.footer p{font-family:'Bebas Neue',Impact,sans-serif;font-size:17px;letter-spacing:0.08em;color:var(--text-muted);}
.footer p span{color:var(--gold);}
@media(max-width:600px){
  .logo{font-size:32px;}.day-btn .ds{font-size:13px;}.day-btn{font-size:9px;padding:10px 3px;}
  .item-name{font-size:14px;}.item-meta{font-size:10px;}.dwhy,.dhow{font-size:12px;}
  .day-title{font-size:32px;}.app{padding:0 14px 80px;}
}
</style>
</head>

  items.forEach(function(i){if(checked[key(day,i.id)])done++;});
  var pct=items.length?Math.round(done/items.length*100):0;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progTxt').textContent=done+' of '+items.length;
  document.getElementById('completeBanner').className=pct===100?'complete show':'complete';
  SCH[day].blocks.forEach(function(b){
    var r=blockDone(day,b);
    var pf=document.getElementById('bpf_'+b.id);
    var bc=document.getElementById('bc_'+b.id);
    if(pf)pf.style.width=(r.total?Math.round(r.done/r.total*100):0)+'%';
    if(bc)bc.textContent=r.done+'/'+r.total;
  });
}

function toggleCheck(day,id){
  var k=key(day,id);checked[k]=!checked[k];save();
  var el=document.getElementById('item_'+id);
  if(el)el.className='item'+(checked[k]?' done':'');
  updateProgress(day);
}

function toggleExpand(id){
  var el=document.getElementById('item_'+id);
  if(!el)return;
  el.className=el.className.indexOf('open')>=0?el.className.replace(' open',''):el.className+' open';
}

function toggleBlock(bid){
  var el=document.getElementById('tb_'+bid);
  if(!el)return;
  el.className=el.className.indexOf('open')>=0?el.className.replace(' open',''):el.className+' open';
}

function resetDay(){
  allItems(currentDay).forEach(function(i){delete checked[key(currentDay,i.id)];});
  save();renderDay(currentDay);
}

function renderDay(day){
  currentDay=day;
  var s=SCH[day];
  document.querySelectorAll('.day-btn').forEach(function(b){
    b.className='day-btn'+(b.getAttribute('data-day')===day?' active':'');
  });
  document.getElementById('dayHdr').innerHTML=
    '<div><div class="day-title">'+day+'</div><div class="day-focus">'+s.focus+'</div></div>'+
    '<div class="dry-badge '+(s.dry?'dry':'drink')+'">'+(s.dry?'Dry Day':'Max 2 drinks')+'</div>';

  var html='';
  s.blocks.forEach(function(block){
    var r=blockDone(day,block);
    var isOpen=block.theme==='morning'||block.theme==='shaolin'||block.theme==='postwalk';
    html+='<div class="time-block tb-'+block.theme+(isOpen?' open':'')+'" id="tb_'+block.id+'">';
    html+='<div class="block-header" onclick="toggleBlock(\''+block.id+'\')">';
    html+='<div class="block-dot"></div>';
    html+='<div class="block-info"><div class="block-time">'+block.time+'</div><div class="block-title">'+block.title+'</div></div>';
    html+='<div class="block-count" id="bc_'+block.id+'">'+r.done+'/'+r.total+'</div>';
    html+='<svg class="block-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    html+='</div>';
    html+='<div class="block-progress"><div class="block-progress-fill" id="bpf_'+block.id+'" style="width:'+(r.total?Math.round(r.done/r.total*100):0)+'%"></div></div>';
    html+='<div class="block-items">';
    block.items.forEach(function(item){
      var isDone=!!checked[key(day,item.id)];
      var howHtml='';
      if(item.how){item.how.split('\n').forEach(function(line){if(line)howHtml+='<p>'+line+'</p>';});}
      html+='<div class="item'+(isDone?' done':'')+'" id="item_'+item.id+'">';
      html+='<div class="item-row" onclick="toggleExpand(\''+item.id+'\')">';
      html+='<div class="chk" onclick="event.stopPropagation();toggleCheck(\''+day+'\',\''+item.id+'\')">';
      html+='<svg class="chk-mark" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      html+='</div>';
      html+='<div class="item-body"><div class="item-name">'+item.name+'</div><div class="item-meta">'+item.meta+'</div></div>';
      html+='<svg class="exp-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      html+='</div>';
      html+='<div class="item-detail">'+icon(item.icon);
      if(item.why)html+='<span class="dlabel">Why</span><div class="dwhy">'+item.why+'</div>';
      if(item.how)html+='<span class="dlabel">How</span><div class="dhow">'+howHtml+'</div>';
      html+='<div class="sets-chip">'+item.meta+'</div>';
      html+='</div></div>';
    });
    html+='</div></div>';
  });
  document.getElementById('content').innerHTML=html;
  updateProgress(day);
}

document.getElementById('todayPill').textContent='Today: '+today;
document.getElementById('resetBtn').onclick=resetDay;
var nav=document.getElementById('dayNav');
DAYS.forEach(function(d){
  var btn=document.createElement('button');
  btn.className='day-btn'+(d===today?' active':'');
  btn.setAttribute('data-day',d);
  btn.innerHTML='<span class="ds">'+d.slice(0,3)+'</span>'+d.slice(0,1);
  btn.onclick=function(){renderDay(d);};
  nav.appendChild(btn);
});
renderDay(today);
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js').catch(function(e){console.log('SW:',e);});
  });
}
</script>
</body>
</html>
