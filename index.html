<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James Sexy Body</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root {
  --black:#0a0a0a;--dark:#111111;--border:#2a2a2a;
  --gold:#c9a84c;--gold-light:#e8c96e;--gold-dim:rgba(201,168,76,0.15);
  --text:#f0ece4;--text-dim:#8a8580;--text-muted:#4a4640;
  --green:#4a9e6b;--green-dim:rgba(74,158,107,0.15);
  --blue-hdr:#0d1b2e;--blue-dot:#5ba4e6;--blue-time:#5ba4e6;--blue-title:#b8d4f0;--blue-bg:#0a1520;--blue-text:#c8dff0;
  --teal-hdr:#0d2420;--teal-dot:#3dbf9a;--teal-time:#3dbf9a;--teal-title:#9ee0cc;--teal-bg:#0a1c18;--teal-text:#b8e8d8;
  --gold-hdr:#221c0e;--gold-dot:#e8c96e;--gold-time:#e8c96e;--gold-title:#e8c96e;--gold-bg:#1a1508;--gold-text:#e0d09a;
  --purple-hdr:#1a1530;--purple-dot:#9b87e0;--purple-time:#9b87e0;--purple-title:#c4b8f0;--purple-bg:#140f28;--purple-text:#ccc0f0;
  --night-hdr:#161616;--night-dot:#8a8580;--night-time:#8a8580;--night-title:#a8a8a0;--night-bg:#111;--night-text:#b0aca8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--text);font-family:'DM Sans',Georgia,sans-serif;font-weight:300;min-height:100vh;}
.app{max-width:780px;margin:0 auto;padding:0 16px 80px;}
.header{padding:36px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px;}
.logo{font-family:'Bebas Neue',Impact,sans-serif;font-size:42px;letter-spacing:0.04em;line-height:1;}
.logo span{color:var(--gold);}
.tagline{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-dim);margin-top:6px;font-family:'DM Mono',monospace;}
.header-pills{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.pill{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em;color:var(--text-muted);padding:4px 10px;border:1px solid var(--border);border-radius:2px;text-transform:uppercase;}
.pill.today{color:var(--gold);border-color:var(--gold-dim);background:var(--gold-dim);}
.day-nav{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:20px;}
.day-btn{background:transparent;border:1px solid var(--border);color:var(--text-muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;padding:10px 2px 8px;cursor:pointer;border-radius:2px;text-align:center;-webkit-tap-highlight-color:transparent;}
.day-btn .ds{display:block;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;margin-bottom:2px;color:var(--text-dim);}
.day-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}
.day-btn.active .ds{color:var(--gold);}
.prog-wrap{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--dark);border:1px solid var(--border);border-radius:4px;margin-bottom:24px;}
.prog-pct{font-family:'Bebas Neue',Impact,sans-serif;font-size:24px;color:var(--gold);min-width:52px;}
.prog-track{flex:1;height:3px;background:var(--border);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:99px;width:0%;transition:width 0.3s;}
.prog-txt{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);white-space:nowrap;}
.reset-btn{background:transparent;border:1px solid var(--border);color:var(--text-muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;padding:6px 10px;cursor:pointer;border-radius:2px;-webkit-tap-highlight-color:transparent;}
.day-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.day-title{font-family:'Bebas Neue',Impact,sans-serif;font-size:36px;letter-spacing:0.04em;line-height:1;}
.day-focus{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);font-family:'DM Mono',monospace;margin-top:5px;}
.dry-badge{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;padding:5px 10px;border-radius:2px;white-space:nowrap;flex-shrink:0;}
.dry-badge.dry{background:var(--green-dim);color:var(--green);border:1px solid rgba(74,158,107,0.3);}
.dry-badge.drink{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(201,168,76,0.3);}
.time-block{margin-bottom:8px;border-radius:6px;overflow:hidden;}
.block-header{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.block-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.block-info{flex:1;}
.block-time{font-size:10px;font-weight:500;letter-spacing:0.1em;font-family:'DM Mono',monospace;margin-bottom:2px;}
.block-title{font-size:13px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;}
.block-count{font-size:10px;font-family:'DM Mono',monospace;opacity:0.6;}
.block-chevron{color:rgba(255,255,255,0.3);transition:transform 0.2s;flex-shrink:0;}
.time-block.open .block-chevron{transform:rotate(180deg);}
.block-progress{height:2px;width:100%;}
.block-progress-fill{height:100%;width:0%;transition:width 0.3s;border-radius:99px;}
.block-items{display:none;}
.time-block.open .block-items{display:block;}
.tb-morning .block-header{background:var(--blue-hdr);}
.tb-morning .block-dot{background:var(--blue-dot);}
.tb-morning .block-time{color:var(--blue-time);}
.tb-morning .block-title{color:var(--blue-title);}
.tb-morning .block-items{background:var(--blue-bg);}
.tb-morning .block-progress{background:rgba(91,164,230,0.15);}
.tb-morning .block-progress-fill{background:var(--blue-dot);}
.tb-morning .item-name{color:var(--blue-text);}
.tb-shaolin .block-header{background:var(--teal-hdr);}
.tb-shaolin .block-dot{background:var(--teal-dot);}
.tb-shaolin .block-time{color:var(--teal-time);}
.tb-shaolin .block-title{color:var(--teal-title);}
.tb-shaolin .block-items{background:var(--teal-bg);}
.tb-shaolin .block-progress{background:rgba(61,191,154,0.15);}
.tb-shaolin .block-progress-fill{background:var(--teal-dot);}
.tb-shaolin .item-name{color:var(--teal-text);}
.tb-postwalk .block-header{background:var(--gold-hdr);}
.tb-postwalk .block-dot{background:var(--gold-dot);}
.tb-postwalk .block-time{color:var(--gold-time);}
.tb-postwalk .block-title{color:var(--gold-title);}
.tb-postwalk .block-items{background:var(--gold-bg);}
.tb-postwalk .block-progress{background:rgba(232,201,110,0.15);}
.tb-postwalk .block-progress-fill{background:var(--gold-dot);}
.tb-postwalk .item-name{color:var(--gold-text);}
.tb-iso .block-header{background:var(--purple-hdr);}
.tb-iso .block-dot{background:var(--purple-dot);}
.tb-iso .block-time{color:var(--purple-time);}
.tb-iso .block-title{color:var(--purple-title);}
.tb-iso .block-items{background:var(--purple-bg);}
.tb-iso .block-progress{background:rgba(155,135,224,0.15);}
.tb-iso .block-progress-fill{background:var(--purple-dot);}
.tb-iso .item-name{color:var(--purple-text);}
.tb-night .block-header{background:var(--night-hdr);}
.tb-night .block-dot{background:var(--night-dot);}
.tb-night .block-time{color:var(--night-time);}
.tb-night .block-title{color:var(--night-title);}
.tb-night .block-items{background:var(--night-bg);}
.tb-night .block-progress{background:rgba(138,133,128,0.15);}
.tb-night .block-progress-fill{background:var(--night-dot);}
.tb-night .item-name{color:var(--night-text);}
.item{border-bottom:1px solid rgba(255,255,255,0.05);}
.item:last-child{border-bottom:none;}
.item.done .item-name{opacity:0.4;text-decoration:line-through;}
.item-row{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.chk{width:22px;height:22px;border:1.5px solid rgba(255,255,255,0.2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.done .chk{background:var(--green);border-color:var(--green);}
.chk-mark{display:none;width:11px;height:9px;}
.done .chk-mark{display:block;}
.item-body{flex:1;min-width:0;}
.item-name{font-size:14px;font-weight:500;line-height:1.3;}
.item-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);margin-top:2px;}
.exp-icon{color:rgba(255,255,255,0.25);flex-shrink:0;transition:transform 0.2s;}
.item.open .exp-icon{transform:rotate(180deg);color:var(--gold);}
.item-detail{display:none;padding:4px 16px 14px 16px;border-top:1px solid rgba(255,255,255,0.05);}
.item.open .item-detail{display:block;}
.dlabel{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted);margin-top:12px;margin-bottom:4px;display:block;}
.dwhy{font-size:13px;color:var(--text-dim);line-height:1.65;padding-left:10px;border-left:2px solid var(--gold-dim);}
.dhow{font-size:13px;color:var(--text);line-height:1.7;}
.dhow p{margin-bottom:4px;}
.sets-chip{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);background:var(--gold-dim);border:1px solid rgba(201,168,76,0.2);padding:3px 10px;border-radius:2px;margin-top:10px;}
.complete{display:none;background:var(--green-dim);border:1px solid rgba(74,158,107,0.3);border-radius:4px;padding:14px 18px;text-align:center;margin-bottom:20px;}
.complete.show{display:block;}
.complete p{font-family:'Bebas Neue',Impact,sans-serif;font-size:22px;color:var(--green);letter-spacing:0.06em;}
.complete small{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--border);text-align:center;}
.footer p{font-family:'Bebas Neue',Impact,sans-serif;font-size:17px;letter-spacing:0.08em;color:var(--text-muted);}
.footer p span{color:var(--gold);}
@media(max-width:600px){
  .logo{font-size:32px;}.day-btn .ds{font-size:13px;}.day-btn{font-size:9px;padding:10px 3px;}
  .item-name{font-size:14px;}.item-meta{font-size:10px;}.dwhy,.dhow{font-size:13px;}
  .day-title{font-size:32px;}.app{padding:0 14px 80px;}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">James <span>Sexy</span> Body</div>
    <div class="tagline">Daily Training System — 50+ | Hutto, TX</div>
    <div class="header-pills">
      <span class="pill">Wake: 5:45am</span>
      <span class="pill">ISO: 10:00am</span>
      <span class="pill">Lights out: 10:00pm</span>
      <span class="pill today" id="todayPill">Today</span>
    </div>
  </div>
  <div class="day-nav" id="dayNav"></div>
  <div class="prog-wrap">
    <div class="prog-pct" id="progPct">0%</div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-txt" id="progTxt">0 of 0</div>
    <button class="reset-btn" id="resetBtn">Reset</button>
  </div>
  <div class="complete" id="completeBanner"><p>Day Complete!</p><small>Consistency builds the body. See you tomorrow.</small></div>
  <div id="dayHdr" class="day-hdr"></div>
  <div id="content"></div>
  <div class="footer"><p>Consistency over intensity. <span>Longevity over aesthetics.</span></p></div>
</div>
<script>
var DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
var d=new Date().getDay();
var today=DAYS[d===0?6:d-1];
var currentDay=today;
var checked={};
try{checked=JSON.parse(localStorage.getItem('jsb_v6')||'{}');}catch(e){checked={};}

var MORNING=[
  {id:'m1',name:'Cayenne electrolyte water',meta:'5:45am — on waking',why:'Primes circulation, hydrates cells, wakes the metabolic system.',how:'16-20 oz warm water + 1/4 tsp cayenne + 1/4 tsp himalayan salt + juice of half a lemon. Made the night before.'},
  {id:'m2',name:'16 oz plain water',meta:'5:50am — pre-walk',why:'Prevents cramp and supports electrolyte balance during the walk.',how:'Drink before stepping on the treadmill. Room temperature or warm is best.'},
  {id:'m3',name:'Dry brush',meta:'5:52am — 3-5 min',why:'Stimulates circulation and lymphatic system before the walk. Wakes up the nervous system.',how:'Always brush toward the heart. Start at feet, move up legs, then hands up arms, then torso toward chest. Firm pressure — skin should be pink not red. Natural bristle brush only.'},
  {id:'m4',name:'Interval walk — 30 min',meta:'5:57am — 3 min slow / 3 min fast x5',why:'Japanese interval protocol — most evidence-backed tool for visceral fat reduction in men over 50.',how:'Slow (2.0-2.5 mph): chin up, shoulders back, light glute squeeze.\nFast (3.5-3.8 mph): drive arms, engage core, push heel to toe. Repeat 5 times.'},
];

var SHAOLIN=[
  {id:'s1',name:'Cat cow spine wave',meta:'10 slow cycles',why:'Wakes up the spine, opens chest, loosens tight upper back.',how:'All fours, hands under shoulders, knees under hips. Breathe in: belly drops, chest lifts, tailbone up. Breathe out: round back, tuck chin, tailbone in. One breath per movement.'},
  {id:'s2',name:'Low dragon',meta:'45 sec each side',why:'Attacks the hip flexors causing your anterior pelvic tilt. Most critical daily stretch.',how:'Step right foot forward into deep lunge, lower left knee to floor. Drive hips forward until deep pull through front of left hip. Hold 45 sec. Switch sides. Long stride — the longer the stride the deeper the stretch.'},
  {id:'s3',name:'Deep squat hold',meta:'60 sec',why:'Opens hips, ankles, calves, and lower back simultaneously.',how:'Feet slightly wider than shoulder width, toes out. Lower as deep as possible, heels on floor. Press hands together at chest, elbows push knees open. Use rolled towel under heels if needed.'},
  {id:'s4',name:'Cossack stretch',meta:'10 slow reps',why:'Trains lateral mobility most men never work.',how:'Feet very wide. Shift weight to right, bend right knee, lower hips. Left leg straight, toes up. Pause at bottom. Move to left side. That is one rep. Go slow.'},
  {id:'s5',name:'Spinal twist',meta:'45 sec each side',why:'Restores upper back rotation. When spine stops turning well, neck and lower back do extra work.',how:'Sit on floor, legs straight. Bend right knee, cross right foot over left leg. Left elbow on outside of right knee. Rotate upper body right. Right hand behind for support. Deepen on each exhale.'},
  {id:'s6',name:'Standing wave',meta:'90 sec',why:'Loosens the whole body together. Calms the nervous system after deeper stretches.',how:'Feet shoulder width, soften knees. Small bend and straighten through knees, let motion travel up through hips, lower back, midback, shoulders, arms. Slow, loose, continuous.'},
];

var POST=[
  {id:'pw1',name:'Whey isolate + creatine shake',meta:'6:37am — within 30 min post-walk',why:'Highest leverage protein window of the day. Muscles primed to absorb protein. Creatine preserves muscle during fat loss.',how:'1 scoop whey isolate + 3-5g creatine in 8-10 oz water or milk. Shake 30 seconds. Drink immediately.'},
  {id:'pw2',name:'Penis pump session',meta:'6:42am — 10-20 min per urologist',why:'Circulation is maximized post-walk and post-Shaolin. Hips are open. Optimal physiological window.',how:'Follow urologist protocol exactly. 10-20 minutes. Complete before showering.'},
  {id:'pw3',name:'Shower',meta:'7:02am',why:'Wash off sweat and transition from training to work day.',how:''},
  {id:'pw4',name:'Moisturize',meta:'7:10am',why:'Supports skin health after dry brushing and training.',how:'Apply to still-slightly-damp skin for best absorption.'},
  {id:'pw5',name:'3 eggs + probiotic',meta:'7:15am — Nature\'s Way Fortify 50 billion',why:'50-60g protein before 8am. Probiotic taken with food containing fat for maximum survival and colonization. Critical for gut health with diverticulitis history.',how:'Cook eggs however preferred. Take 1 Nature\'s Way Fortify capsule with first few bites. Do not take with cayenne water or cinnamon — both reduce probiotic effectiveness.'},
];

var CORR=[
  {id:'c1',name:'90/90 hip flexor stretch',meta:'60 sec',why:'Directly counters the anterior pelvic tilt. Resets the pelvis before every training session.',how:'Lie on back, both knees bent at 90 degrees, feet flat. Press lower back firmly into the floor — no gap. Hold 60 seconds breathing slowly.'},
  {id:'c2',name:'Glute bridge — upgraded',meta:'3 x 15 reps, 3 sec hold at top',why:'Reactivates sleeping glutes and drives blood into the pelvic region.',how:'Lie flat, walk feet in until fingertips lightly touch heels. Brace core gently. Press through heels, lift hips to straight line knees-hips-shoulders. Squeeze hard, hold 2-3 sec at top. The pause is the point.'},
  {id:'c3',name:'Dead bug',meta:'3 x 10 each side',why:'Trains deep spinal stabilizers with lower back pressed flat. Directly retrains the pelvic tilt pattern.',how:'On back, arms to ceiling, knees at 90 degrees above hips. Lower back glued to floor throughout. Slowly lower right arm and left leg simultaneously. Return. Switch. Go slow.'},
];
var CORR2=[CORR[0],CORR[1]];

var NIGHT=[
  {id:'n1',name:"Mix tomorrow's cayenne electrolyte water",meta:'9:30pm',why:'Remove all morning friction. It is ready when you wake up.',how:'Warm water + 1/4 tsp cayenne + 1/4 tsp himalayan salt + juice of half a lemon. Refrigerate or leave on counter.'},
  {id:'n2',name:'Chia and cinnamon water + zinc',meta:'9:45pm — Zinc Picolinate 30mg',why:'Chia and cinnamon regulate blood sugar overnight. Zinc taken at night supports testosterone production during deep sleep. Picolinate form absorbs well on near-empty stomach.',how:'1 tbsp chia seeds + 1 tsp Ceylon cinnamon blended in 18 oz water. Take 1 zinc picolinate capsule alongside. Do not take zinc at the same time as your probiotic.'},
  {id:'n3',name:'D3/K2',meta:'9:45pm — Dr Berg 10,000 IU',why:'D3 is fat soluble — it needs dietary fat to absorb properly. Taking it at dinner or after your last meal of the day ensures it has the fat from your evening meal to absorb into. K2 directs calcium to bones not arteries. Critical combination for men over 50.',how:'Take 1 Dr Berg D3/K2 capsule with or just after dinner. If you ate salmon or chicken with olive oil or avocado tonight the absorption will be excellent.'},
  {id:'n4',name:'Chia and cinnamon water',meta:'9:45pm',why:'Regulates blood sugar overnight, supports gut health, and reduces inflammation.',how:'1 tbsp chia seeds + 1 tsp Ceylon cinnamon blended in 18 oz water. Drink before bed.'},
  {id:'n5',name:'Lights out',meta:'10:00pm',why:'Testosterone is produced during deep sleep. Consistent bedtime is as important as the time itself.',how:'No screens after 9:30pm. Room cool and dark. Wake time tomorrow: 5:45am.'},
];

var NIGHT_SUN=[
  {id:'ns1',name:"Mix Monday's cayenne electrolyte water",meta:'9:30pm',why:'Remove all Monday morning friction. It is ready when you wake up.',how:'Warm water + 1/4 tsp cayenne + 1/4 tsp himalayan salt + juice of half a lemon. Refrigerate or leave on counter.'},
  {id:'ns2',name:'Chia and cinnamon water + zinc',meta:'9:45pm — Zinc Picolinate 30mg',why:'Chia and cinnamon regulate blood sugar overnight. Zinc taken at night supports testosterone production during deep sleep.',how:'1 tbsp chia seeds + 1 tsp Ceylon cinnamon blended in 18 oz water. Take 1 zinc picolinate capsule alongside. Do not take zinc at the same time as your probiotic.'},
  {id:'ns3',name:'D3/K2',meta:'9:45pm — Dr Berg 10,000 IU',why:'D3 is fat soluble and needs dietary fat to absorb. K2 directs calcium to bones not arteries. Critical combination for men over 50.',how:'Take 1 Dr Berg D3/K2 capsule with or just after dinner.'},
  {id:'ns4',name:'Prepare mentally for Monday',meta:'Before lights out — 10:00pm',why:'Sunday night sets the tone for the entire week. Consistent bedtime protects testosterone production during deep sleep.',how:'No screens after 9:30pm. Room cool and dark. Wake time tomorrow: 5:45am. Your week starts tonight.'},
];

var MON_MAIN=CORR.concat([
  {id:'mo1',name:'Hollow body hold',meta:'3 x 60 sec',why:'Ultimate deep core on-switch. Locks ribs to pelvis protecting your discs and restoring spinal control.',how:'Lie flat, press lower back into floor — no gap. Lift legs and shoulders just a few inches. Tuck knees if back arches. Hold 60 sec. Shaking means your nervous system is waking up.'},
  {id:'mo2',name:'Plank hold',meta:'3 x 45 sec',why:'Builds anterior core while reinforcing neutral spine. Squeeze glutes AND abs simultaneously.',how:'Forearms on floor, elbows under shoulders. Tuck pelvis — pull belly button toward spine, tailbone toward floor. Squeeze glutes AND abs. No sagging hips.'},
  {id:'mo3',name:'Superman hold',meta:'3 x 30 sec',why:'Strengthens lower back and posterior chain to support corrected posture.',how:'Lie face down, arms extended overhead. Lift arms, chest, and legs simultaneously. Squeeze glutes at top. Hold 30 seconds. Lower with control.'},
  {id:'mo4',name:'Side plank',meta:'2 x 30 sec each side',why:'Builds lateral core stability — allows spine to resist rotation and compression.',how:'Lie on side, forearm on floor, elbow under shoulder. Lift hips so body forms straight line head to feet. Hold 30 seconds each side.'},
]);

var TUE_MAIN=CORR.concat([
  {id:'tu1',name:'Shaolin wall push',meta:'6 x 10 sec maximum effort',why:'Maximum upper body strength with zero joint stress. Teaches your brain your muscles still need to be powerful.',how:'Stand facing solid wall, hands at chest height, feet stepped back. Push the wall over with everything you have. Do not move — drive all power through palms. Breathe throughout. Rest 15 seconds between sets.'},
  {id:'tu2',name:'Doorframe chest press ISO hold',meta:'3 x 30 sec',why:'Activates the full chest without equipment. Isometric contraction builds functional pressing strength.',how:'Stand in doorframe. Place palms on frame at chest height on each side. Press outward as hard as possible. Hold 30 seconds. Breathe throughout.'},
  {id:'tu3',name:'Scapular wall slide hold',meta:'3 x 20 sec',why:'Directly retrains the scapular muscles that pull your forward shoulders back into correct position.',how:'Stand with back against wall, arms at 90 degrees, back of hands touching wall. Slowly slide arms up keeping contact throughout. Hold at top 20 seconds. Should feel like work across your upper back.'},
  {id:'tu4',name:'Towel row hold',meta:'3 x 30 sec each arm',why:'Builds pulling strength that balances pushing muscles and corrects forward shoulder posture.',how:'Loop towel around door handle. Grab one end, step back until tension, lean back slightly. Pull yourself toward door holding the contraction. Hold 30 seconds. Switch arms.'},
]);

var WED_MAIN=CORR2.concat([
  {id:'we1',name:'Pancake stretch',meta:'3 x 10 reps slow and controlled',why:'Reactivates the entire posterior chain from feet through hamstrings into hips and spine. Directly supports pelvic floor function.',how:'Stand feet wide — twice shoulder width. Hinge forward at hips only — not from back or shoulders. Spine long, chest slightly open. Lower torso until parallel to ground. Pause 2-3 seconds. Rise with control. This is not cardio — go slow.'},
  {id:'we2',name:'Pigeon pose hold',meta:'3 x 45 sec each side',why:'Deep external hip rotation stretch targeting the piriformis and deep glute muscles — source of hip stiffness.',how:'From plank, bring right knee toward right hand, right foot toward left hand. Lower hips toward floor. Left leg extended behind. Use folded towel under right hip if needed. Hold 45 seconds. Switch sides.'},

function key(day,id){return day+'__'+id;}
function allItems(day){var a=[];SCH[day].blocks.forEach(function(b){b.items.forEach(function(i){a.push(i);});});return a;}
function save(){try{localStorage.setItem('jsb_v6',JSON.stringify(checked));}catch(e){}}

function blockProgress(day,block){
  var done=0;
  block.items.forEach(function(i){if(checked[key(day,i.id)])done++;});
  return{done:done,total:block.items.length};
}

function updateProgress(day){
  var items=allItems(day),done=0;
  items.forEach(function(i){if(checked[key(day,i.id)])done++;});
  var pct=items.length?Math.round(done/items.length*100):0;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progTxt').textContent=done+' of '+items.length;
  document.getElementById('completeBanner').className=pct===100?'complete show':'complete';
  SCH[day].blocks.forEach(function(b){
    var r=blockProgress(day,b);
    var pf=document.getElementById('bpf_'+b.id);
    var bc=document.getElementById('bc_'+b.id);
    if(pf)pf.style.width=(r.total?Math.round(r.done/r.total*100):0)+'%';
    if(bc)bc.textContent=r.done+'/'+r.total;
  });
}

function toggleCheck(day,id){
  var k=key(day,id);checked[k]=!checked[k];save();
  var el=document.getElementById('item_'+id);
  if(el)el.className='item'+(checked[k]?' done':'');
  updateProgress(day);
}

function toggleExpand(id){
  var el=document.getElementById('item_'+id);
  if(!el)return;
  el.className=el.className.indexOf('open')>=0?el.className.replace(' open',''):el.className+' open';
}

function toggleBlock(bid){
  var el=document.getElementById('tb_'+bid);
  if(!el)return;
  el.className=el.className.indexOf('open')>=0?el.className.replace(' open',''):el.className+' open';
}

function resetDay(){
  allItems(currentDay).forEach(function(i){delete checked[key(currentDay,i.id)];});
  save();renderDay(currentDay);
}

function renderDay(day){
  currentDay=day;
  var s=SCH[day];
  document.querySelectorAll('.day-btn').forEach(function(b){
    b.className='day-btn'+(b.getAttribute('data-day')===day?' active':'');
  });
  document.getElementById('dayHdr').innerHTML=
    '<div><div class="day-title">'+day+'</div><div class="day-focus">'+s.focus+'</div></div>'+
    '<div class="dry-badge '+(s.dry?'dry':'drink')+'">'+(s.dry?'Dry Day':'Max 2 drinks')+'</div>';
  var html='';
  s.blocks.forEach(function(block){
    var r=blockProgress(day,block);
    var isOpen=block.theme==='morning'||block.theme==='shaolin'||block.theme==='postwalk';
    html+='<div class="time-block tb-'+block.theme+(isOpen?' open':'')+'" id="tb_'+block.id+'">';
    html+='<div class="block-header" onclick="toggleBlock(\''+block.id+'\')">';
    html+='<div class="block-dot"></div>';
    html+='<div class="block-info"><div class="block-time">'+block.time+'</div><div class="block-title">'+block.title+'</div></div>';
    html+='<div class="block-count" id="bc_'+block.id+'">'+r.done+'/'+r.total+'</div>';
    html+='<svg class="block-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    html+='</div>';
    html+='<div class="block-progress"><div class="block-progress-fill" id="bpf_'+block.id+'" style="width:'+(r.total?Math.round(r.done/r.total*100):0)+'%"></div></div>';
    html+='<div class="block-items">';
    block.items.forEach(function(item){
      var isDone=!!checked[key(day,item.id)];
      var howHtml='';
      if(item.how){item.how.split('\n').forEach(function(line){if(line)howHtml+='<p>'+line+'</p>';});}
      html+='<div class="item'+(isDone?' done':'')+'" id="item_'+item.id+'">';
      html+='<div class="item-row" onclick="toggleExpand(\''+item.id+'\')">';
      html+='<div class="chk" onclick="event.stopPropagation();toggleCheck(\''+day+'\',\''+item.id+'\')">';
      html+='<svg class="chk-mark" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      html+='</div>';
      html+='<div class="item-body"><div class="item-name">'+item.name+'</div><div class="item-meta">'+item.meta+'</div></div>';
      html+='<svg class="exp-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      html+='</div>';
      html+='<div class="item-detail">';
      if(item.why)html+='<span class="dlabel">Why</span><div class="dwhy">'+item.why+'</div>';
      if(item.how)html+='<span class="dlabel">How</span><div class="dhow">'+howHtml+'</div>';
      html+='<div class="sets-chip">'+item.meta+'</div>';
      html+='</div></div>';
    });
    html+='</div></div>';
  });
  document.getElementById('content').innerHTML=html;
  updateProgress(day);
}
