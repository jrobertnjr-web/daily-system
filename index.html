<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James Sexy Body</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

:root {
  --black: #0a0a0a;
  --dark: #111111;
  --border: #2a2a2a;
  --gold: #c9a84c;
  --gold-light: #e8c96e;
  --gold-dim: rgba(201,168,76,0.15);
  --text: #f0ece4;
  --text-dim: #8a8580;
  --text-muted: #4a4640;
  --green: #4a9e6b;
  --green-dim: rgba(74,158,107,0.15);
  --red: #c0392b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--black);
  color: var(--text);
  font-family: 'DM Sans', Georgia, sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

.app { max-width: 780px; margin: 0 auto; padding: 0 16px 80px; }

.header { padding: 36px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.logo { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 42px; letter-spacing: 0.04em; line-height: 1; }
.logo span { color: var(--gold); }
.tagline { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); margin-top: 6px; font-family: 'DM Mono', monospace; }
.header-pills { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.pill { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; color: var(--text-muted); padding: 4px 10px; border: 1px solid var(--border); border-radius: 2px; text-transform: uppercase; }
.pill.today { color: var(--gold); border-color: var(--gold-dim); background: var(--gold-dim); }

/* DAY NAV */
.day-nav { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-bottom: 20px; }
.day-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 10px 2px 8px;
  cursor: pointer;
  border-radius: 2px;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
}
.day-btn .ds { display: block; font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; margin-bottom: 2px; color: var(--text-dim); }
.day-btn.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
.day-btn.active .ds { color: var(--gold); }

/* PROGRESS */
.prog-wrap { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--dark); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 24px; }
.prog-pct { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 24px; color: var(--gold); min-width: 52px; }
.prog-track { flex: 1; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 99px; width: 0%; transition: width 0.3s; }
.prog-txt { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); white-space: nowrap; }
.reset-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; padding: 6px 10px; cursor: pointer; border-radius: 2px; -webkit-tap-highlight-color: transparent; }

/* DAY HEADER */
.day-hdr { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.day-title { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 36px; letter-spacing: 0.04em; line-height: 1; }
.day-focus { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); font-family: 'DM Mono', monospace; margin-top: 5px; }
.dry-badge { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 10px; border-radius: 2px; white-space: nowrap; flex-shrink: 0; }
.dry-badge.dry { background: var(--green-dim); color: var(--green); border: 1px solid rgba(74,158,107,0.3); }
.dry-badge.drink { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }

/* SECTION */
.section { margin-bottom: 20px; }
.sec-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); padding-bottom: 8px; display: flex; align-items: center; gap: 10px; }
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ITEM */
.item { background: var(--dark); border: 1px solid var(--border); border-radius: 3px; margin-bottom: 3px; }
.item.done { border-color: rgba(74,158,107,0.25); background: rgba(74,158,107,0.04); }
.item-row { display: flex; align-items: center; gap: 12px; padding: 14px 14px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.chk { width: 24px; height: 24px; border: 1.5px solid var(--text-muted); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.done .chk { background: var(--green); border-color: var(--green); }
.chk-mark { display: none; width: 12px; height: 10px; }
.done .chk-mark { display: block; }
.item-body { flex: 1; min-width: 0; }
.item-name { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.3; }
.done .item-name { color: var(--text-muted); text-decoration: line-through; }
.item-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.exp-icon { color: var(--text-muted); flex-shrink: 0; transition: transform 0.2s; }
.item.open .exp-icon { transform: rotate(180deg); color: var(--gold); }

/* DETAIL */
.item-detail { display: none; padding: 4px 14px 14px 50px; border-top: 1px solid var(--border); }
.item.open .item-detail { display: block; }
.dlabel { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin-top: 12px; margin-bottom: 4px; display: block; }
.dwhy { font-size: 13px; color: var(--text-dim); line-height: 1.65; padding-left: 10px; border-left: 2px solid var(--gold-dim); }
.dhow { font-size: 13px; color: var(--text); line-height: 1.7; }
.dhow p { margin-bottom: 4px; }
.sets-chip { display: inline-block; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--gold); background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.2); padding: 3px 10px; border-radius: 2px; margin-top: 10px; }

/* COMPLETE */
.complete { display: none; background: var(--green-dim); border: 1px solid rgba(74,158,107,0.3); border-radius: 3px; padding: 14px 18px; text-align: center; margin-bottom: 20px; }
.complete.show { display: block; }
.complete p { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 22px; color: var(--green); letter-spacing: 0.06em; }
.complete small { font-size: 11px; color: var(--text-dim); font-family: 'DM Mono', monospace; }

.footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center; }
.footer p { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 17px; letter-spacing: 0.08em; color: var(--text-muted); }
.footer p span { color: var(--gold); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">James <span>Sexy</span> Body</div>
    <div class="tagline">Daily Training System — 50+ | Hutto, TX</div>
    <div class="header-pills">
      <span class="pill">Wake: 5:45am</span>
      <span class="pill">ISO: 10:00am</span>
      <span class="pill">Lights out: 10:00pm</span>
      <span class="pill today" id="todayPill">Today</span>
    </div>
  </div>
  <div class="day-nav" id="dayNav"></div>
  <div class="prog-wrap">
    <div class="prog-pct" id="progPct">0%</div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-txt" id="progTxt">0 of 0</div>
    <button class="reset-btn" id="resetBtn">Reset</button>
  </div>
  <div class="complete" id="completeBanner"><p>Day Complete!</p><small>Consistency builds the body. See you tomorrow.</small></div>
  <div id="dayHdr" class="day-hdr"></div>
  <div id="content"></div>
  <div class="footer"><p>Consistency over intensity. <span>Longevity over aesthetics.</span></p></div>
</div>

<script>
var DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
var d = new Date().getDay();
var today = DAYS[d === 0 ? 6 : d - 1];
var currentDay = today;
var checked = {};

try { checked = JSON.parse(localStorage.getItem('jsb_v2') || '{}'); } catch(e) { checked = {}; }

var MORNING = [
  {id:'m1',name:'Cayenne electrolyte water',meta:'5:45am — on waking',why:'Primes circulation, hydrates cells, wakes the metabolic system.',how:'16-20 oz warm water + 1/4 tsp cayenne + 1/4 tsp himalayan salt + juice of half a lemon. Made the night before.'},
  {id:'m2',name:'16 oz plain water',meta:'5:50am — pre-walk',why:'Prevents cramp and supports electrolyte balance during the walk.',how:'Drink 16 oz plain water before stepping on the treadmill. Room temperature or warm is best.'},
  {id:'m3',name:'Dry brush',meta:'5:52am — 3-5 min',why:'Stimulates circulation and lymphatic system before the walk. Skin is clean and completely dry — ideal brushing surface. Wakes up the nervous system.',how:'Always brush toward the heart. Start at feet, move up legs, then hands up arms, then torso toward chest. Firm pressure but not painful — skin should be pink not red. Natural bristle brush only.'},
  {id:'m4',name:'Interval walk — 30 min',meta:'5:57am — 3 min slow / 3 min fast x5',why:'Japanese interval protocol — most evidence-backed tool for visceral fat reduction in men over 50.',how:'Slow phase (2.0-2.5 mph): reset posture, chin up, shoulders back, light glute squeeze.\nFast phase (3.5-3.8 mph): drive arms, engage core, push heel to toe.\nRepeat 5 times for 30 minutes total.'},

var SHAOLIN = [
  {id:'s1',name:'Cat cow spine wave',meta:'10 slow cycles',why:'Wakes up the spine, opens chest, loosens tight upper back.',how:'All fours, hands under shoulders, knees under hips. Breathe in: belly drops, chest lifts, tailbone up. Breathe out: round back, tuck chin, tailbone in. One breath per movement.'},
  {id:'s2',name:'Low dragon',meta:'45 sec each side',why:'Your most critical stretch — directly attacks the hip flexors causing your anterior pelvic tilt.',how:'Step right foot forward into deep lunge, lower left knee to floor. Drive hips forward until deep pull through front of left hip and thigh. Hold 45 sec. Switch sides. Long stride — the longer the stride the deeper the stretch.'},
  {id:'s3',name:'Deep squat hold',meta:'60 sec',why:'Opens hips, ankles, calves, and lower back simultaneously. Triggers deep muscle and hormonal activation.',how:'Feet slightly wider than shoulder width, toes out. Lower as deep as possible, heels on floor. Press hands together at chest, elbows push knees open. Use rolled towel under heels if needed.'},
  {id:'s4',name:'Cossack stretch',meta:'10 slow reps',why:'Trains lateral mobility most men never work. The body slowly loses what it does not train.',how:'Feet very wide. Shift weight to right, bend right knee, lower hips. Left leg straight, toes up. Pause at bottom. Move to left side. That is one rep. Go slow.'},
  {id:'s5',name:'Spinal twist',meta:'45 sec each side',why:'Restores upper back rotation. When spine stops turning well, neck and lower back do extra work.',how:'Sit on floor, legs straight. Bend right knee, cross right foot over left leg. Left elbow on outside of right knee, rotate upper body right. Right hand behind for support. Deepen on each exhale.'},
  {id:'s6',name:'Standing wave',meta:'90 sec',why:'Loosens the whole body together. Calms the nervous system after deeper stretches.',how:'Feet shoulder width, soften knees. Small bend and straighten through knees, let motion travel up through hips, lower back, midback, shoulders, arms. Slow, loose, continuous.'},

var POST = [
  {id:'pw1',name:'Whey isolate + creatine shake',meta:'6:37am — within 30 min post-walk',why:'Highest leverage protein window of the day. Muscles primed to absorb protein. Creatine preserves muscle during fat loss.',how:'1 scoop whey isolate + 3-5g creatine monohydrate in 8-10 oz water or milk. Shake 30 seconds. Drink immediately.'},
  {id:'pw2',name:'Penis pump session',meta:'6:42am — 10-20 min per urologist',why:'Circulation is maximized post-walk and post-Shaolin. Hips are open from low dragon and deep squat. Optimal physiological window.',how:'Follow urologist protocol exactly. 10-20 minutes. Complete before showering.'},
  {id:'pw3',name:'Shower',meta:'7:02am',why:'Wash off sweat and transition from training to work day.',how:''},
  {id:'pw4',name:'Moisturize',meta:'7:10am',why:'Post-shower moisturizing supports skin health after dry brushing and training.',how:'Apply to still-slightly-damp skin for best absorption.'},
  {id:'pw5',name:'3 eggs + probiotic',meta:'7:15am',why:'Combined with shake: 50-60g protein before 8am. Probiotic taken with food for maximum survival. Critical for gut health especially with diverticulitis history.',how:'Cook eggs however preferred. Take 1 Nature\'s Way Fortify capsule with your first few bites. Do not take with cayenne water or cinnamon.'},

var CORR = [
  {id:'c1',name:'90/90 hip flexor stretch',meta:'60 sec',why:'Directly counters the anterior pelvic tilt. Resets the pelvis before every training session.',how:'Lie on back, both knees bent at 90 degrees, feet flat. Press lower back firmly into the floor — no gap. Hold 60 seconds breathing slowly.'},
  {id:'c2',name:'Glute bridge — upgraded',meta:'3 x 15 reps, 3 sec hold at top',why:'Reactivates sleeping glutes and drives blood into the pelvic region. Supports urologist protocol.',how:'Lie flat, walk feet in until fingertips lightly touch heels. Brace core gently. Press through heels, lift hips to straight line knees-hips-shoulders. Squeeze hard, hold 2-3 sec at top. The pause is the point.'},
  {id:'c3',name:'Dead bug',meta:'3 x 10 each side',why:'Trains deep spinal stabilizers with lower back pressed flat. Directly retrains the pelvic tilt pattern.',how:'On back, arms to ceiling, knees at 90 degrees above hips. Lower back glued to floor throughout. Slowly lower right arm and left leg simultaneously. Return. Switch. Go slow.'},

var CORR2 = [CORR[0], CORR[1]];

var NIGHT = [
  {id:'n1',name:"Mix tomorrow's cayenne electrolyte water",meta:'9:30pm',why:'Remove all morning friction. It is ready when you wake up.',how:'Warm water + 1/4 tsp cayenne + 1/4 tsp himalayan salt + juice of half a lemon. Refrigerate or leave on counter.'},
  {id:'n2',name:'Chia and cinnamon water',meta:'9:45pm',why:'Regulates blood sugar overnight, supports gut health, and reduces inflammation.',how:'1 tbsp chia seeds + 1 tsp Ceylon cinnamon blended in 18 oz water. Drink before bed.'},
  {id:'n3',name:'Lights out',meta:'10:00pm',why:'Testosterone is produced during deep sleep. Consistent bedtime is as important as the time itself.',how:'No screens after 9:30pm. Room cool and dark. Consistent wake time tomorrow: 5:45am.'},

var SCH = {
  Monday: { focus:'Core + Posterior Chain', dry:true, sections:[
    {t:'Morning Stack', items:MORNING},
    {t:'Shaolin 6 — Post Walk (6:27am)', items:SHAOLIN},

    {t:'Main Session — Core + Posterior Chain (10:00am)', items:[
      {id:'mo1',name:'Hollow body hold',meta:'3 x 60 sec',why:'Ultimate deep core on-switch. Locks ribs to pelvis protecting your discs and restoring spinal control.',how:'Lie flat, press lower back into floor — no gap. Lift legs and shoulders just a few inches. Tuck knees if back arches. Hold 60 sec. Shaking means your nervous system is waking up.'},
      {id:'mo2',name:'Bear crawl hold',meta:'3 x 60 sec',why:'Forces shoulders, core, and hips to work as one unit. Prevents disconnected movement that causes pulled muscles.',how:'All fours, hands under shoulders, knees under hips. Tuck toes, lift knees one inch off floor. Back flat. Hold 60 seconds.'},
      {id:'mo3',name:'Plank hold',meta:'3 x 45 sec',why:'Builds anterior core while reinforcing the neutral spine position you are retraining.',how:'Forearms on floor, elbows under shoulders. Tuck pelvis — pull belly button toward spine, tailbone toward floor. Squeeze glutes AND abs simultaneously. No sagging hips.'},
      {id:'mo4',name:'Superman hold',meta:'3 x 30 sec',why:'Strengthens lower back and posterior chain to support corrected posture.',how:'Lie face down, arms extended overhead. Lift arms, chest, and legs simultaneously. Squeeze glutes at top. Hold 30 seconds.'},
      {id:'mo5',name:'Side plank',meta:'2 x 30 sec each side',why:'Builds lateral core stability — allows spine to resist rotation and compression.',how:'Lie on side, forearm on floor, elbow under shoulder. Lift hips so body forms straight line head to feet. Hold 30 seconds each side.'},
    ]},
    {t:'Night Routine', items:NIGHT},
  ]},
  Tuesday: { focus:'Upper Body + Shoulder Stability', dry:true, sections:[
    {t:'Morning Stack', items:MORNING},
    {t:'Shaolin 6 — Post Walk (6:27am)', items:SHAOLIN},
    {t:'Post Walk Sequence (6:37am)', items:POST},
    {t:'Corrective Sequence — Do First (10:00am)', items:CORR},
    {t:'Main Session — Upper Body + Shoulder Stability (10:00am)', items:[
      {id:'tu1',name:'Shaolin wall push',meta:'6 x 10 sec maximum effort',why:'Maximum upper body strength activation with zero joint stress. Teaches your brain your muscles still need to be powerful.',how:'Stand facing solid wall, hands at chest height, feet stepped back. Try to push the wall over with everything you have. Do not move — drive all power through palms. Breathe throughout. Rest 15 seconds between sets.'},
      {id:'tu2',name:'Wall push-up hold',meta:'3 x 30 sec pause at bottom',why:'Builds chest and shoulder strength with isometric pause that activates more muscle fibers.',how:'Hands on wall at chest height. Lower chest toward wall until arms at 90 degrees. Hold 30 seconds. Squeeze chest at the pause.'},
      {id:'tu3',name:'Doorframe chest press ISO hold',meta:'3 x 30 sec',why:'Activates the full chest without equipment. Isometric contraction builds functional pressing strength.',how:'Stand in doorframe. Place palms on frame at chest height on each side. Press outward as hard as possible. Hold 30 seconds. Breathe throughout.'},
      {id:'tu4',name:'Scapular wall slide hold',meta:'3 x 20 sec',why:'Your photos show forward shoulders. This directly retrains the scapular muscles that pull shoulders back into correct position.',how:'Stand with back against wall, arms at 90 degrees, back of hands touching wall. Slowly slide arms up the wall keeping contact. Hold at top 20 seconds.'},
      {id:'tu5',name:'Towel row hold',meta:'3 x 30 sec each arm',why:'Builds pulling strength that balances pushing muscles and corrects forward shoulder posture.',how:'Loop towel around door handle. Grab one end, step back until there is tension, lean back slightly. Pull yourself toward door. Hold 30 seconds. Switch arms.'},
      {id:'tu6',name:'Overhead reach hold',meta:'2 x 30 sec',why:'Opens the chest and counters the forward shoulder pull seen in your posture photos.',how:'Stand tall. Reach both arms overhead, slightly behind your ears. Hold 30 seconds. Feel the stretch through chest, shoulders, and lats.'},
    ]},
    {t:'Night Routine', items:NIGHT},
  ]},
  Wednesday: { focus:'Hip Flexors + Full Body Flexibility', dry:true, sections:[

    {t:'Shaolin 6 — Post Walk (6:27am)', items:SHAOLIN},
    {t:'Post Walk Sequence (6:37am)', items:POST},
    {t:'Corrective Sequence — Do First (10:00am)', items:CORR2},
    {t:'Main Session — Hip Flexors + Full Body Flexibility (10:00am)', items:[
      {id:'we1',name:'Pancake stretch',meta:'3 x 8-10 reps slow',why:'Reactivates the entire posterior chain from feet through hamstrings into hips and spine. Directly supports pelvic floor function and urologist protocol.',how:'Stand with feet wide — twice shoulder width. Hinge forward at hips only. Keep spine long, chest slightly open. Lower torso until parallel to ground. Pause 2-3 seconds. Rise with control. This is not cardio — go slow.'},
      {id:'we2',name:'Deep lunge hold',meta:'3 x 45 sec each side',why:'Your most important stretch. Directly targets hip flexors causing anterior pelvic tilt.',how:'Step right foot forward into a deep lunge — take a long stride. Lower left knee to the ground. Drive hips forward slowly until deep pull from front of hip down into thigh. Hold 45 seconds.'},
      {id:'we3',name:'Pigeon pose hold',meta:'3 x 45 sec each side',why:'Deep external hip rotation stretch targeting piriformis and deep glute muscles — source of hip stiffness limiting your movement.',how:'From plank, bring right knee toward right hand, right foot toward left hand. Lower hips toward floor. Left leg extended behind. Use folded towel under right hip if needed. Hold 45 seconds. Switch sides.'},
      {id:'we4',name:'Standing hamstring hold',meta:'3 x 30 sec',why:'Tight hamstrings contribute directly to anterior pelvic tilt by pulling the pelvis and forcing the lower back to compensate.',how:'Stand tall. Hinge forward at hips and reach toward toes. Let upper body hang loose. Hold 30 seconds. Breathe.'},
      {id:'we5',name:'Figure-four hip stretch',meta:'3 x 45 sec each side',why:'Targets deep hip rotators and glutes for maximum lower back and hip relief.',how:'Lie on your back. Cross right ankle over left knee creating a figure four shape. Pull left thigh toward chest until you feel stretch in right hip and glute. Hold 45 seconds. Switch sides.'},

  ]},

    {t:'Post Walk Sequence (6:37am)', items:POST},
    {t:'Corrective Sequence — Do First (10:00am)', items:CORR},
    {t:'Main Session — Lower Body + Balance (10:00am)', items:[
      {id:'th1',name:'Horse stance',meta:'3 x 60 sec building to 90 sec',why:'The Shaolin foundation. Stimulates nitric oxide production which dilates blood vessels and improves circulation to the lower body — supporting testosterone signaling.',how:'Feet wider than shoulder width — about 1.5 times. Slowly lower hips as if sitting into invisible chair. Knees tracking in line with toes. Spine upright. Heat in muscles is correct — pain in joints means adjust.'},
      {id:'th2',name:'Hollow body hold',meta:'3 x 60 sec',why:'Reinforces deep core activation from Monday. Consistency is what changes the pattern.',how:'Lie flat on your back. Press lower back into floor. Lift legs and shoulders just a few inches. Tuck knees if back arches. Hold 60 seconds.'},
      {id:'th3',name:'Bear crawl hold',meta:'3 x 60 sec',why:'Second session this week locks in the full-body integration pattern.',how:'All fours, hands under shoulders, knees under hips. Tuck toes, lift knees one inch. Back flat. Hold 60 seconds.'},
      {id:'th4',name:'Wall sit',meta:'3 x 60 sec',why:'Bulletproofs your knees. Builds the specific endurance that keeps you moving independently for decades.',how:'Lean back against flat wall. Slide down until knees at 90 degrees. Weight in heels. Back glued to wall. Aim for 60 seconds.'},
      {id:'th5',name:'Single-leg balance hold',meta:'3 x 30 sec each leg',why:'Balance deteriorates faster than any other physical quality after 50. Training it directly prevents falls.',how:'Stand on one foot. Hold 30 seconds. Eyes open first, progress to eyes closed when stable. The wobble is the work.'},
      {id:'th6',name:'Calf raise hold at top',meta:'3 x 30 sec',why:'Calf strength supports ankle stability and circulation back up through the legs toward the heart.',how:'Stand flat on floor or edge of step. Rise up on toes as high as possible. Hold at top 30 seconds. Lower slowly.'},
    ]},
    {t:'Night Routine', items:NIGHT},
  ]},
  Friday: { focus:'Full Body Integration + Deep Stretch', dry:false, sections:[
    {t:'Morning Stack', items:MORNING},
    {t:'Shaolin 6 — Post Walk (6:27am)', items:SHAOLIN},
    {t:'Post Walk Sequence (6:37am)', items:POST},
    {t:'Corrective Sequence — Do First (10:00am)', items:CORR2},
    {t:'Main Session — Full Body Integration + Deep Stretch (10:00am)', items:[
      {id:'fr1',name:'Pancake stretch',meta:'3 x 8-10 reps',why:'Opens the posterior chain and pelvic floor for the week-end reset.',how:'Feet wide — twice shoulder width. Hinge at hips only — spine long, chest open. Lower to parallel. Pause 2-3 seconds. Rise with control. Slow and intentional.'},
      {id:'fr2',name:'Plank to down dog flow',meta:'5 rounds slow, hold each',why:'Integrates core strength with full posterior chain flexibility.',how:'Start in plank. Hold 10 seconds. Push back into down dog — hips high, heels pressing toward floor. Hold 10 seconds. Return to plank. That is one round. Keep the transition slow.'},

function key(day, id) { return day + '__' + id; }

function allItems(day) {
  var all = [];
  SCH[day].sections.forEach(function(s) { s.items.forEach(function(i) { all.push(i); }); });
  return all;
}

function save() {
  try { localStorage.setItem('jsb_v2', JSON.stringify(checked)); } catch(e) {}
}

function updateProgress(day) {
  var items = allItems(day);
  var done = 0;
  items.forEach(function(i) { if (checked[key(day, i.id)]) done++; });
  var pct = items.length ? Math.round(done / items.length * 100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progPct').textContent = pct + '%';
  document.getElementById('progTxt').textContent = done + ' of ' + items.length;
  var banner = document.getElementById('completeBanner');
  if (pct === 100) banner.className = 'complete show';
  else banner.className = 'complete';
}

function toggleCheck(day, id) {
  var k = key(day, id);
  checked[k] = !checked[k];
  save();
  var el = document.getElementById('item_' + id);
  if (el) el.className = 'item' + (checked[k] ? ' done' : '');
  updateProgress(day);
}

function toggleExpand(id) {
  var el = document.getElementById('item_' + id);
  if (!el) return;
  if (el.className.indexOf('open') >= 0) {
    el.className = el.className.replace(' open', '');
  } else {
    el.className += ' open';
  }
}

function resetDay() {
  allItems(currentDay).forEach(function(i) { delete checked[key(currentDay, i.id)]; });
  save();
  renderDay(currentDay);
}

function renderDay(day) {
  currentDay = day;
  var s = SCH[day];

  document.querySelectorAll('.day-btn').forEach(function(b) {
    b.className = 'day-btn' + (b.getAttribute('data-day') === day ? ' active' : '');
  });

  document.getElementById('dayHdr').innerHTML =
    '<div><div class="day-title">' + day + '</div><div class="day-focus">' + s.focus + '</div></div>' +
    '<div class="dry-badge ' + (s.dry ? 'dry' : 'drink') + '">' + (s.dry ? 'Dry Day' : 'Max 2 drinks') + '</div>';

  var html = '';
  s.sections.forEach(function(sec) {
    html += '<div class="section"><div class="sec-label">' + sec.t + '</div>';
    sec.items.forEach(function(item) {
      var isDone = !!checked[key(day, item.id)];
      var howHtml = '';
      if (item.how) {
        item.how.split('\n').forEach(function(line) { if (line) howHtml += '<p>' + line + '</p>'; });
      }
      html += '<div class="item' + (isDone ? ' done' : '') + '" id="item_' + item.id + '">' +
        '<div class="item-row" onclick="toggleExpand(\'' + item.id + '\')">' +
        '<div class="chk" onclick="event.stopPropagation();toggleCheck(\'' + day + '\',\'' + item.id + '\')">' +
        '<svg class="chk-mark" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '</div>' +
        '<div class="item-body"><div class="item-name">' + item.name + '</div><div class="item-meta">' + item.meta + '</div></div>' +
        '<svg class="exp-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '</div>' +
        '<div class="item-detail">' +
        (item.why ? '<span class="dlabel">Why</span><div class="dwhy">' + item.why + '</div>' : '') +
        (item.how ? '<span class="dlabel">How</span><div class="dhow">' + howHtml + '</div>' : '') +
        '<div class="sets-chip">' + item.meta + '</div>' +
        '</div></div>';
    });
    html += '</div>';
  });

  document.getElementById('content').innerHTML = html;
  updateProgress(day);
}

// INIT
document.getElementById('todayPill').textContent = 'Today: ' + today;
document.getElementById('resetBtn').onclick = resetDay;

var nav = document.getElementById('dayNav');
DAYS.forEach(function(d) {
  var btn = document.createElement('button');
  btn.className = 'day-btn' + (d === today ? ' active' : '');
  btn.setAttribute('data-day', d);
  btn.innerHTML = '<span class="ds">' + d.slice(0,3) + '</span>' + d.slice(0,1);
  btn.onclick = function() { renderDay(d); };
  nav.appendChild(btn);
});

renderDay(today);

// SERVICE WORKER REGISTRATION
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').then(function(reg) {
      console.log('SW registered, scope:', reg.scope);
    }).catch(function(err) {
      console.log('SW registration failed:', err);
    });
  });
}
